services:
  - type: web
    name: creditxplain-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ML_SERVICE_URL
        sync: false
      - key: CLIENT_URL
        sync: false

  - type: web
    name: creditxplain-ml
    env: python
    rootDir: ml
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
